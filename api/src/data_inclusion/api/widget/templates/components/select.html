{% macro select(name, label, placeholder, options, selected) -%}
<style>
    .input-group {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: var(--padding-extra-small);
    }
</style>
<div class="input-group">
    <label for="input-{{ name }}">
        {{ label }}
    </label>
    <div>
        <select name="{{ name }}" id="input-{{ name }}">
            <option value="" disabled {% if not selected %}selected{% endif %}>{{ placeholder }}</option>
            {% for option in options %}
            <option value="{{ option.value }}" {% if selected == option.value %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
        </select>
    </div>
</div>
{%- endmacro %}
