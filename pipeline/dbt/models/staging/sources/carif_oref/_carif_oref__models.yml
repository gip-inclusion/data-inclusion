version: 2

models:
  - name: stg_carif_oref__actions__publics
    columns:
      - name: numero_action
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__actions')
              field: numero
      - name: code_public_vise
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ~ '\d{5}'
          # TODO(vmttn): load formacode
          # - relationships:
          #     to: ref('')
          #     field:
      - name: version_formacode
        data_tests:
          - accepted_values:
              values: [V13]

  - name: stg_carif_oref__actions
    columns:
      - name: numero
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
          - relationships:
              # check that every action has (at least) one corresponding public
              to: ref('stg_carif_oref__actions__publics')
              field: numero_action
      - name: numero_formation
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__formations')
              field: numero
      - name: numero_organisme_formateur
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__organismes_formateurs')
              field: numero
      - name: code_perimetre_recrutement
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.5
              config:
                severity: warn
          - relationships:
              to: ref('stg_carif_oref__tables__perimetres_recrutement')
              field: key
      - name: conditions_specifiques
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: detail_conditions_prise_en_charge
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.1
          - dbt_utils.not_empty_string
      - name: info_public_vise
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.1
          - dbt_utils.not_empty_string
      - name: modalites_enseignement
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__tables__modalites_enseignement')
              field: key
      - name: modalites_recrutement
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.1
          - dbt_utils.not_empty_string
      - name: prise_en_charge_frais_possible
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: prix_total_ttc
        data_tests:
          - dbt_utils.at_least_one
      - name: url_action
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.1

  - name: stg_carif_oref__formations
    columns:
      - name: numero
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: date_maj
        data_tests:
          - not_null
      - name: intitule_formation
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: objectif_formation
        data_tests:
          - not_null
          - dbt_utils.not_empty_string

  - name: stg_carif_oref__organismes_formateurs
    columns:
      - name: numero
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: raison_sociale_formateur
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: siret_formateur__siret
        data_tests:
          - dbt_utils.not_empty_string

  - name: stg_carif_oref__organismes_formateurs__contacts
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - numero_action
            - numero_organisme_formateur
            - hash_coordonnees
            - type_contact
    columns:
      - name: numero_action
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__actions')
              field: numero
      - name: numero_organisme_formateur
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__organismes_formateurs')
              field: numero
      - name: type_contact
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__tables__types_contact')
              field: key
      - name: hash_coordonnees
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_carif_oref__coordonnees')
              field: hash_

  - name: stg_carif_oref__coordonnees
    columns:
      - name: hash_
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: courriel
        data_tests:
          - dbt_utils.not_empty_string
      - name: web
        data_tests:
          - dbt_utils.at_least_one
      - name: telfixe
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.5
      - name: portable
        data_tests:
          - dbt_utils.at_least_one
      - name: hash_adresse
        data_tests:
          - relationships:
              to: ref('stg_carif_oref__adresses')
              field: hash_

  - name: stg_carif_oref__adresses
    columns:
      - name: hash_
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: denomination
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.1
          - dbt_utils.not_empty_string
      - name: ligne
      - name: ligne__1
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: codepostal
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: ville
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: departement
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_decoupage_administratif__departements')
              field: code
      - name: code_insee_commune
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_decoupage_administratif__communes')
              field: code
              config:
                error_if: ">1"
      - name: code_insee_arrondissement
        data_tests:
          - relationships:
              to: ref('stg_decoupage_administratif__arrondissements')
              field: code
      - name: region
        data_tests:
          - relationships:
              to: ref('stg_decoupage_administratif__regions')
              field: code
      - name: pays
        data_tests:
          - accepted_values:
              values: [FR]
      - name: geolocalisation__latitude
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.5
      - name: geolocalisation__longitude
        data_tests:
          - dbt_utils.not_null_proportion:
              at_least: 0.5

  - name: stg_carif_oref__tables__modalites_enseignement
    columns:
      - name: key
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: value
        data_tests:
          - not_null
          - dbt_utils.not_empty_string

  - name: stg_carif_oref__tables__perimetres_recrutement
    columns:
      - name: key
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: value
        data_tests:
          - not_null
          - dbt_utils.not_empty_string

  - name: stg_carif_oref__tables__types_contact
    columns:
      - name: key
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: value
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
