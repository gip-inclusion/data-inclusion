  - name: stg_mediation_numerique__structures__dispositifs
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null

  - name: stg_mediation_numerique__structures__programmes_nationaux
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
