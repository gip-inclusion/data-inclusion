version: 2

models:
  - name: stg_mediation_numerique__structures
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: nom
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: siret
        data_tests:
          - dbt_utils.not_empty_string
      - name: date_maj
        data_tests:
          - not_null
      - name: latitude
        data_tests:
          - dbt_utils.not_constant
      - name: longitude
        data_tests:
          - dbt_utils.not_constant
      - name: adresse__commune
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: adresse__code_postal
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: adresse__code_insee
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9

  - name: stg_mediation_numerique__services
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: date_maj
        data_tests:
          - not_null
      - name: services
        data_tests:
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.5
