version: 2

models:
  - name: stg_mediation_numerique__structures
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string
      - name: nom
        data_tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: siret
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.at_least_one
          - dbt_utils.not_constant
      - name: date_maj
        data_tests:
          - not_null
      - name: latitude
        data_tests:
          - dbt_utils.not_constant
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: longitude
        data_tests:
          - dbt_utils.not_constant
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: adresse__commune
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: adresse__code_postal
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9
      - name: adresse__code_insee
        data_tests:
          - dbt_utils.not_empty_string
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.9

  - name: stg_mediation_numerique__structures__services
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('_map_mediation_numerique__thematiques')
                field: service

  - name: stg_mediation_numerique__structures__frais
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('_map_mediation_numerique__frais')
                field: frais_source

  - name: stg_mediation_numerique__structures__modalites_acces
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('_map_mediation_numerique__modalites_acces')
                field: modalite_source

  - name: stg_mediation_numerique__structures__modalites_accompagnement
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('_map_mediation_numerique__modalites_accompagnement')
                field: modalite_source

  - name: stg_mediation_numerique__structures__publics
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mediation_numerique__structures')
                field: id
      - name: value
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('_map_mediation_numerique__publics')
                field: public_source

  - name: stg_mediation_numerique__structures__prises_en_charge
    columns:
      - name: structure_id
        data_tests:
          - not_null
          - relationships:
