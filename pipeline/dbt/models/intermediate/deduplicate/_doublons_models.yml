
models:
  - name: int__doublons_structures
    description: |
      Holds the clusters of duplicates for every structure.
      A given structure can only be part of a maximum of one cluster of duplicates.
    columns:
      - name: id
        data_tests:
          - not_null
      - name: structure_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('int__union_structures')
              field: _di_surrogate_id
      - name: score
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 0.7
              max_value: 1
      - name: size
        description: The size of the cluster. Added for convenience.
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 2

  - name: int__doublons_paires_structures
    description: |
      Displays the duplicates as pairs of structures, including their sources.
      This is mainly a useful denormalization for our analytics.
    columns:
      - name: id
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__doublons_structures')
              field: id
      - name: source_1
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: source
      - name: structure_id_1
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: _di_surrogate_id
      - name: source_2
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: source
      - name: structure_id_2
        data_tests:
          - not_null
          - relationships:
              to: ref('int__union_structures')
              field: _di_surrogate_id
      - name: size
        description: The size of the cluster. Added for convenience.
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 2

  - name: int__doublons_nb_clusters_par_source
    description: Displays the total number of clusters of duplicates in which each source appears.
    columns:
      - name: source
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: source
      - name: cluster_count
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 1

  - name: int__doublons_nb_mono_source
    description: Per source, the number of clusters in which only this source appears.
    columns:
      - name: source
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: source
      - name: cluster_count
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 1

  - name: int__doublons_nb_multi_source
    description: Per source, the number of clusters in whichat least another source appears.
    columns:
      - name: source
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - relationships:
              to: ref('int__union_structures')
              field: source
      - name: cluster_count
        data_tests:
          - not_null
          - dbt_utils.not_constant
          - dbt_utils.accepted_range:
              min_value: 1
