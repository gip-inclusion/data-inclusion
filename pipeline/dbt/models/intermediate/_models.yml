version: 2

models:
  - name: int__plausible_personal_emails

  - name: int__union_adresses
    data_tests:
      - check_adresse:
          include:
            - _di_surrogate_id
          config:
            severity: warn

  - name: int__union_contacts
    columns:
      - name: contact_uid
        data_tests:
          - unique
          - not_null
      - name: courriel
        data_tests:
          - not_null
          - dbt_utils.not_empty_string

  - name: int__union_services
    data_tests:
      - check_service:
          include:
            - _di_surrogate_id
          config:
            severity: warn

  - name: int__union_structures
    data_tests:
      - check_structure:
          include:
            - _di_surrogate_id
          config:
            severity: warn

  - name: int__union_adresses__enhanced

  - name: int__union_contacts__enhanced
    columns:
      - name: id
      - name: source
      - name: contact_nom_prenom
      - name: courriel
      - name: telephone
      - name: rgpd_notice_was_objected_to
      - name: rgpd_notice_has_hardbounced

  - name: int__union_services__enhanced
    columns:
      - name: zone_diffusion_code
        data_tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.not_empty_string
          - dbt_utils.not_constant
          - dbt_utils.expression_is_true:
              expression: "!~ '^(751|693|132)'"
              config:
                severity: warn
          - relationships:
              to: ref('stg_decoupage_administratif__regions')
              field: code
              where: "zone_diffusion_type = 'region'"
            # TODO(vmttn): prevent false codes from being propagated downstream
            # and set back severity to error
              config:
                severity: warn
          - relationships:
              to: ref('stg_decoupage_administratif__departements')
              field: code
              where: "zone_diffusion_type = 'departement'"
              config:
                severity: warn
          - relationships:
              to: ref('stg_decoupage_administratif__epcis')
              field: code
              where: "zone_diffusion_type = 'epci'"
              config:
                severity: warn
          - relationships:
              to: ref('stg_decoupage_administratif__communes')
              field: code
              where: "zone_diffusion_type = 'commune'"
              config:
                severity: warn

  - name: int__union_structures__enhanced

  - name: int__geocodages
    description: |
      This model is incremental, it will only geocode new or changed addresses.
      It stores raw geocoding results, without filtering.
      Geocoding is done by calling the BAN api in PL/Python.
    columns:
      - name: geocoded_at
        data_tests:
          - not_null
      - name: adresse_id
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('int__union_adresses')
              field: _di_surrogate_id
      - name: input_adresse
      - name: input_code_insee
      - name: input_code_postal
      - name: input_commune
      - name: commune
        data_tests:
          - dbt_utils.not_empty_string
      - name: adresse
        data_tests:
          - dbt_utils.not_empty_string
      - name: code_postal
        data_tests:
          - dbt_utils.not_empty_string
      - name: code_commune
        data_tests:
          - dbt_utils.not_empty_string
          - relationships:
              to: ref('stg_decoupage_administratif__communes')
              field: code
      - name: code_arrondissement
        data_tests:
          - dbt_utils.not_empty_string
          - relationships:
              to: ref('stg_decoupage_administratif__arrondissements')
              field: code
      - name: latitude
      - name: longitude
      - name: score
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: type
        data_tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values:
                - housenumber
                - street
                - locality
                - municipality

unit_tests:
  - name: test_geocodages_full_refresh_mode
    model: int__geocodages
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int__union_adresses')
        rows:
          - {_di_surrogate_id: foo, adresse: 17 rue Malus, commune: Lille, code_postal: 59000, code_insee: 59350}
    expect:
      rows:
        - {adresse_id: foo}

  - name: test_geocodages_incremental_mode
    # - row `unchanged` was previously geocoded and has not changed. It must not be re-geocoded.
    # - row `failed` was previously geocoded but failed. It must be re-geocoded.
    # - rows `changed-<INPUT>` were previously geocoded, but INPUT have changed. They must be re-geocoded.
    # - row `new` was not previously geocoded. It must be geocoded.
    model: int__geocodages
    description: |
      Test that geocoding is incremental
    overrides:
      macros:
        is_incremental: true
    given:
      - input: ref('int__union_adresses')
        rows:
          - {_di_surrogate_id: unchanged, adresse: 17 rue Malus, code_postal: 59000, code_insee: 59350, commune: Lille}
          - {_di_surrogate_id: failed, adresse: 17 rue Malus, code_postal: 59000, code_insee: 59350, commune: Lille}
          - {_di_surrogate_id: changed-adresse, adresse: changed, code_postal: 59000, code_insee: 59350, commune: Lille}
          - {_di_surrogate_id: changed-code-postal, adresse: 17 rue Malus, code_postal: changed, code_insee: 59350, commune: Lille}
          - {_di_surrogate_id: changed-code-insee, adresse: 17 rue Malus, code_postal: 59000, code_insee: changed, commune: Lille}
          - {_di_surrogate_id: changed-commune, adresse: 17 rue Malus, code_postal: 59000, code_insee: 59350, commune: changed}
          - {_di_surrogate_id: new, adresse: 17 rue Malus, code_postal: 59000, code_insee: 59350, commune: Lille}
      - input: this
        rows:
          - {adresse_id: unchanged, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: 1}
          - {adresse_id: failed, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: null}
          - {adresse_id: changed-adresse, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: 1}
          - {adresse_id: changed-code-postal, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: 1}
          - {adresse_id: changed-code-insee, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: 1}
          - {adresse_id: changed-commune, input_adresse: 17 rue Malus, input_code_postal: 59000, input_code_insee: 59350, input_commune: Lille, score: 1}
    expect:
      rows:
        - {adresse_id: failed}
        - {adresse_id: changed-adresse}
        - {adresse_id: changed-code-postal}
        - {adresse_id: changed-code-insee}
        - {adresse_id: changed-commune}
        - {adresse_id: new}

  - name: test_services_with_blacklisted_contact
    model: int__union_services
    overrides:
      macros:
        # This is the actual input service data
        dbt_utils.union_relations: |
          select
            'dora' as source,
            'foo' as id,
            'foo' as structure_id,
            'foo' as adresse_id,
            'truc@toto.at' as courriel,
            'Jean Valjean' as contact_nom_prenom,
            '0123456789' as telephone
          UNION ALL
          select
            'mednum' as source,
            'bar' as id,
            'bar' as structure_id,
            'bar' as adresse_id,
            'truc@toto.at' as courriel,
            'Jean Valjean' as contact_nom_prenom,
            '0123456789' as telephone
          UNION ALL
          select
            'lezemplois' as source,
            'baz' as id,
            'baz' as structure_id,
            'baz' as adresse_id,
            'truc@toto.at' as courriel,
            'Jean Valjean' as contact_nom_prenom,
            '0123456789' as telephone
          UNION ALL
          select
            'autre' as source,
            'solo' as id,
            'solo' as structure_id,
            'solo' as adresse_id,
            'solo@autre.net' as courriel,
            'Autre Personne' as contact_nom_prenom,
            '06666666' as telephone
        dbt_utils.star: 'id, source, adresse_id, structure_id'
    given:
      # Those are only needed to fool DBT's parser, which first enforces that
      # all the models referenced in the union are mocked in the test.
      - input: ref('int_action_logement__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_agefiph__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_data_inclusion__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_dora__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_france_travail__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_fredo__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_mediation_numerique__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_mes_aides__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_monenfant__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_odspep__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_reseau_alpha__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_soliguide__services')
        format: sql
        rows: SELECT NULL LIMIT 0
      - input: ref('int_dora__services')
        rows: SELECT NULL LIMIT 0
        format: sql
      - input: ref('int_brevo__contacts')
        format: sql
        rows:
          select ARRAY['dora:services:foo'] as contact_uids, TRUE as est_interdit, '2021-01-01' as date_di_rgpd_opposition
          UNION ALL
          select ARRAY['mednum:services:bar'] as contact_uids, FALSE as est_interdit, '2021-01-01' as date_di_rgpd_opposition
          UNION ALL
          select ARRAY['lezemplois:services:baz'] as contact_uids, FALSE as est_interdit, NULL as date_di_rgpd_opposition
          UNION ALL
          select ARRAY['sans:services:rapport'] as contact_uids, TRUE as est_interdit, NULL as date_di_rgpd_opposition

    expect:
      rows:
        - {source: dora, id: foo, adresse_id: foo, structure_id: foo, courriel: NULL, contact_nom_prenom: NULL, telephone: NULL}
        - {source: mednum, id: bar, adresse_id: bar, structure_id: bar, courriel: truc@toto.at, contact_nom_prenom: NULL, telephone: NULL}
        - {source: lezemplois, id: baz, adresse_id: baz, structure_id: baz, courriel: truc@toto.at, contact_nom_prenom: Jean Valjean, telephone: '0123456789'}
        - {source: autre, id: solo, adresse_id: solo, structure_id: solo, courriel: solo@autre.net, contact_nom_prenom: Autre Personne, telephone: '06666666'}
